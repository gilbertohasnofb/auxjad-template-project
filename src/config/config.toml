[filename]
    output_filename = "my_composition"  # note, filename should not contain spaces

[include]
    filenames = ["articulate.ly"]

[header]
    title = "title"
    subtitle = "subtitle"
    composer = "composer"
    dedication = "dedication"
    year = 2026  # used only for terminal printouts, not in final score
    poet = "Score in C"
    fontsize = 1.5

[tempo]
    tempo_reference_note = 8
    tempo_value = 72
    tempo_value_prefix = "ca. "  # The space at the end of the string may be omited for prefixes
                                 # such as "~", which would output a tempo of 8 = ~72

[size]
    paper_size = "a4"  # use "a4landscape" for landscape orientation
    staff_size = 15.5

[paper]
    top_margin = '2.0\cm'
    bottom_margin = '2.3\cm'
    left_margin = '1.7\cm'
    right_margin = '1.7\cm'
    indent = '1.4\cm'
    short_indent = '1.1\cm'
    print_page_number = "##f"
    ragged_last_bottom = "##f"
    min_systems_per_page = 2
    max_systems_per_page = 2
    system_system_spacing_minimum_distance = 15
    markup_system_spacing_basic_distance = 4
    markup_system_spacing_minimum_distance = 4
    markup_system_spacing_padding = 4
    system_separator = '\fill-line {\slashSeparator \slashSeparator}'

[layout]
    accidental_style = "dodecaphonic"
    flag_style = "flat-flag"
    hide_empty_staves = true
    grand_staff_brace_collapse_height = 4
    base_shortest_duration = "1/32"
    horizontal_tuplets = true
    full_length_tuplets = true
    large_time_signatures = true

[instrumentation]
    instrument_names = [
        "Flute",
        "Piano",
        "Harp",
        "Cello",
    ]
    short_instrument_names = [
        "Fl.",
        "Pno",
        "Hp.",
        "Vcl.",
    ]
    contexts = [
        "Staff",
        "GrandStaff",  # not PianoStaff so that hide_empty_staves can work for this instrument
        "GrandStaff",
        "Staff",
    ]
    staff_names = [
        "Flute",
        ["Piano_Upper", "Piano_Middle", "Piano_Lower"],
        ["Harp_Upper", "Harp_Lower"],
        "Cello",
    ]
    initial_clefs = [
        "treble",
        ["treble^8", "treble", "bass"],
        ["treble", "bass"],
        "bass",
    ]
